<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AES 加密解密工具</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1e2a37;
      --muted: #5b6b7a;
      --line: #d8e1eb;
      --accent: #0f766e;
      --accent-2: #0b5f58;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #eaf5ff 0%, var(--bg) 45%), var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 16px 40px rgba(15, 38, 64, 0.08);
      padding: 20px;
    }

    .title {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 700;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      align-items: center;
    }

    .password-wrap {
      flex: 1 1 320px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    input[type="password"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    input[type="password"]:focus,
    textarea:focus {
      border-color: #7ec4be;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-self: flex-end;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: transform .12s ease, opacity .12s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-2);
    }

    .btn-secondary {
      background: #e7eef6;
      color: #22313f;
    }

    .btn-light {
      background: #f3f7fb;
      color: #2a3a49;
      border: 1px solid var(--line);
    }

    .progress-wrap {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fbff;
      overflow: hidden;
      display: none;
    }

    .progress-wrap.active {
      display: block;
    }

    .progress-bar {
      height: 10px;
      width: 0;
      background: linear-gradient(90deg, #0f766e 0%, #3aa89f 100%);
      transition: width 0.12s ease;
    }

    .progress-text {
      padding: 8px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .pane {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea {
      width: 100%;
      min-height: 340px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      outline: none;
      background: #fff;
      color: var(--text);
    }

    .status {
      min-height: 20px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 820px) {
      .panes {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">AES 加密解密工具</h1>
    <p class="subtitle">左侧贴入文本并输入密码，点击加密或解密，结果显示在右侧。</p>

    <div class="toolbar">
      <div class="password-wrap">
        <label for="password">AES 密码</label>
        <input id="password" type="password" placeholder="请输入密码">
      </div>
      <div class="actions">
        <button id="encryptBtn" class="btn-primary" type="button">加密</button>
        <button id="decryptBtn" class="btn-secondary" type="button">解密</button>
        <button id="importBtn" class="btn-light" type="button">导入文本</button>
        <button id="exportBtn" class="btn-light" type="button">导出结果</button>
      </div>
    </div>

    <input id="fileInput" type="file" accept=".txt,.csv,.log,.json" hidden>

    <section class="panes">
      <div class="pane">
        <label for="inputText">输入（明文或密文）</label>
        <textarea id="inputText" placeholder="在这里输入需要加密或解密的内容"></textarea>
      </div>
      <div class="pane">
        <label for="outputText">输出结果</label>
        <textarea id="outputText" readonly placeholder="结果会显示在这里"></textarea>
      </div>
    </section>

    <div id="progressWrap" class="progress-wrap">
      <div id="progressBar" class="progress-bar"></div>
      <div id="progressText" class="progress-text">处理中 0%</div>
    </div>

    <div id="status" class="status"></div>
  </main>

  <script>
    const encoder = new TextEncoder();
    const decoder = new TextDecoder();

    const inputEl = document.getElementById('inputText');
    const outputEl = document.getElementById('outputText');
    const passwordEl = document.getElementById('password');
    const statusEl = document.getElementById('status');
    const encryptBtn = document.getElementById('encryptBtn');
    const decryptBtn = document.getElementById('decryptBtn');
    const importBtn = document.getElementById('importBtn');
    const exportBtn = document.getElementById('exportBtn');
    const fileInput = document.getElementById('fileInput');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    const CONCURRENCY = 8;

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = isError ? 'status error' : 'status';
    }

    function setBusy(busy) {
      encryptBtn.disabled = busy;
      decryptBtn.disabled = busy;
      importBtn.disabled = busy;
      exportBtn.disabled = busy;
    }

    function updateProgress(done, total, label) {
      if (total <= 0) {
        progressWrap.classList.remove('active');
        return;
      }
      const percent = Math.min(100, Math.round((done / total) * 100));
      progressWrap.classList.add('active');
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `${label} ${percent}% (${done}/${total})`;
    }

    function finishProgress() {
      setTimeout(() => {
        progressWrap.classList.remove('active');
        progressBar.style.width = '0%';
        progressText.textContent = '处理中 0%';
      }, 250);
    }

    function bytesToBase64(bytes) {
      let binary = '';
      for (let i = 0; i < bytes.length; i += 1) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function base64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    async function deriveAesKey(password, salt) {
      const keyMaterial = await crypto.subtle.importKey(
        'raw',
        encoder.encode(password),
        'PBKDF2',
        false,
        ['deriveKey']
      );

      return crypto.subtle.deriveKey(
        {
          name: 'PBKDF2',
          salt,
          iterations: 100000,
          hash: 'SHA-256'
        },
        keyMaterial,
        {
          name: 'AES-GCM',
          length: 256
        },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function encryptText(plainText, password) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveAesKey(password, salt);

      const encrypted = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        encoder.encode(plainText)
      );

      const encryptedBytes = new Uint8Array(encrypted);
      const merged = new Uint8Array(salt.length + iv.length + encryptedBytes.length);
      merged.set(salt, 0);
      merged.set(iv, salt.length);
      merged.set(encryptedBytes, salt.length + iv.length);

      return bytesToBase64(merged);
    }

    async function decryptText(cipherBase64, password) {
      const allBytes = base64ToBytes(cipherBase64.trim());
      if (allBytes.length < 29) {
        throw new Error('密文格式不正确');
      }

      const salt = allBytes.slice(0, 16);
      const iv = allBytes.slice(16, 28);
      const data = allBytes.slice(28);
      const key = await deriveAesKey(password, salt);

      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv },
        key,
        data
      );

      return decoder.decode(decrypted);
    }

    async function processLines(lines, processLine, modeLabel) {
      const total = lines.length;
      const output = new Array(total).fill('');
      let done = 0;
      let success = 0;
      let failed = 0;
      let cursor = 0;

      updateProgress(0, total, modeLabel);

      async function worker() {
        while (true) {
          const current = cursor;
          cursor += 1;
          if (current >= total) {
            return;
          }

          const line = lines[current];
          if (!line) {
            done += 1;
            updateProgress(done, total, modeLabel);
            continue;
          }

          try {
            output[current] = await processLine(line, current);
            success += 1;
          } catch (err) {
            output[current] = `【第${current + 1}行处理失败】`;
            failed += 1;
            void err;
          }

          done += 1;
          updateProgress(done, total, modeLabel);
        }
      }

      const workerCount = Math.max(1, Math.min(CONCURRENCY, total));
      const tasks = [];
      for (let i = 0; i < workerCount; i += 1) {
        tasks.push(worker());
      }
      await Promise.all(tasks);

      return {
        output,
        success,
        failed
      };
    }

    async function handleEncrypt() {
      const text = inputEl.value;
      const password = passwordEl.value;
      if (!text.trim()) {
        setStatus('请输入要加密的内容', true);
        return;
      }
      if (!password) {
        setStatus('请输入 AES 密码', true);
        return;
      }

      try {
        const lines = text.split(/\r?\n/);
        setBusy(true);
        const result = await processLines(lines, (line) => encryptText(line, password), '加密中');
        outputEl.value = result.output.join('\n');
        if (result.failed > 0) {
          setStatus(`加密完成：成功 ${result.success} 行，失败 ${result.failed} 行`, true);
        } else {
          setStatus(`加密完成：逐行处理 ${result.success} 行`);
        }
      } catch (err) {
        setStatus(`加密失败：${err.message || err}`, true);
      } finally {
        setBusy(false);
        finishProgress();
      }
    }

    async function handleDecrypt() {
      const text = inputEl.value;
      const password = passwordEl.value;
      if (!text.trim()) {
        setStatus('请输入要解密的密文', true);
        return;
      }
      if (!password) {
        setStatus('请输入 AES 密码', true);
        return;
      }

      try {
        const lines = text.split(/\r?\n/);
        setBusy(true);
        const result = await processLines(lines, (line, index) => decryptText(line, password), '解密中');
        const withDecryptTag = result.output.map((item, idx) => {
          if (item === `【第${idx + 1}行处理失败】`) {
            return `【第${idx + 1}行解密失败】`;
          }
          return item;
        });
        outputEl.value = withDecryptTag.join('\n');
        if (result.failed > 0) {
          setStatus(`解密完成：成功 ${result.success} 行，失败 ${result.failed} 行`, true);
        } else {
          setStatus(`解密完成：逐行处理 ${result.success} 行`);
        }
      } catch (err) {
        setStatus(`解密失败：${err.message || err}`, true);
      } finally {
        setBusy(false);
        finishProgress();
      }
    }

    function handleImport() {
      fileInput.value = '';
      fileInput.click();
    }

    function handleFileChange(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        const text = typeof reader.result === 'string' ? reader.result : '';
        inputEl.value = text;
        setStatus(`导入完成：${file.name}`);
      };
      reader.onerror = () => {
        setStatus('导入失败：文件读取错误', true);
      };
      reader.readAsText(file, 'utf-8');
    }

    function handleExport() {
      const content = outputEl.value;
      if (!content.trim()) {
        setStatus('没有可导出的结果，请先加密或解密', true);
        return;
      }

      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `aes_result_${Date.now()}.txt`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setStatus('导出完成：结果文件已下载');
    }

    encryptBtn.addEventListener('click', handleEncrypt);
    decryptBtn.addEventListener('click', handleDecrypt);
    importBtn.addEventListener('click', handleImport);
    exportBtn.addEventListener('click', handleExport);
    fileInput.addEventListener('change', handleFileChange);
  </script>
</body>
</html>
